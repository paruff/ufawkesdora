# ============================================================================
# Phase 4: Deploy — GitOps CD Deployment
# ----------------------------------------------------------------------------
# Promotes a new image tag through environment overlays, commits the change,
# triggers GitOps reconciliation, and verifies the rollout.
#
# PERMISSIONS FIX: `contents: write` is set at the JOB level, not the
# workflow level. This prevents the `startup_failure` that occurred when
# the caller (pipeline.yml) had `contents: read` but the reusable workflow
# declared `contents: write` at file scope.
#
# Dependencies: pre-deployment.yml
# Followed by: post-deployment.yml
# ============================================================================

name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev, staging, production)"
        required: true
        type: string
      image-tag:
        description: "Container image tag to deploy"
        required: true
        type: string
      image-name:
        description: "Container image name (without tag)"
        required: true
        type: string
      deploy-mode:
        description: "Deployment mode: 'monorepo' or 'gitops-repo'"
        required: false
        type: string
        default: "monorepo"
      manifest-path:
        description: "Path to kustomization or manifest directory"
        required: false
        type: string
        default: "overlays/dev"
      wait-for-reconciliation:
        description: "Seconds to wait for GitOps controller reconciliation"
        required: false
        type: number
        default: 60
      rollback-on-failure:
        description: "Automatically rollback if verification fails"
        required: false
        type: boolean
        default: false
      previous-image-tag:
        description: "Previous stable image tag for rollback"
        required: false
        type: string
        default: ""

permissions:
  contents: read # Default — job will override for its specific needs

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # ── PERMISSIONS FIX ───────────────────────────────────────────────────
    # Contents: write is needed ONLY for this job to push GitOps manifest
    # updates. Setting it at the job level avoids the `startup_failure` that
    # occurs when a reusable workflow declares broader permissions than its
    # caller.
    permissions:
      contents: write
      pull-requests: write

    outputs:
      status: ${{ steps.deploy-outcome.outputs.status }}
      deployed-tag: ${{ inputs.image-tag }}
      environment: ${{ inputs.environment }}

    steps:
      # ── DORA Timestamp ──────────────────────────────────────────────────
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"
          echo "environment:${{ inputs.environment }}"
          echo "image:${{ inputs.image-name }}:${{ inputs.image-tag }}"

      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ── Update Image Tag in Manifests ───────────────────────────────────
      - name: Update image tag
        id: update-tag
        run: |
          MANIFEST_DIR="${{ inputs.manifest-path }}"
          echo "Updating image ${{ inputs.image-name }} to tag ${{ inputs.image-tag }} in $MANIFEST_DIR"

          if [ -f "$MANIFEST_DIR/kustomization.yaml" ] || [ -f "$MANIFEST_DIR/kustomization.yml" ]; then
            KUSTOMIZE_FILE=$(ls "$MANIFEST_DIR/kustomization.yaml" "$MANIFEST_DIR/kustomization.yml" 2>/dev/null | head -1)

            if grep -q "newTag:" "$KUSTOMIZE_FILE"; then
              sed -i "s|newTag:.*|newTag: ${{ inputs.image-tag }}|" "$KUSTOMIZE_FILE"
              echo "✅ Updated newTag in $KUSTOMIZE_FILE"
            elif grep -q "newName:" "$KUSTOMIZE_FILE"; then
              sed -i "s|newName:.*|newName: ${{ inputs.image-name }}|" "$KUSTOMIZE_FILE"
              sed -i "s|newTag:.*|newTag: ${{ inputs.image-tag }}|" "$KUSTOMIZE_FILE"
              echo "✅ Updated newName/newTag in $KUSTOMIZE_FILE"
            else
              echo "⚠️ No image override found, appending..."
              printf '\nimages:\n' >> "$KUSTOMIZE_FILE"
              printf '  - name: PLACEHOLDER_IMAGE\n' >> "$KUSTOMIZE_FILE"
              printf '    newName: %s\n' "${{ inputs.image-name }}" >> "$KUSTOMIZE_FILE"
              printf '    newTag: %s\n' "${{ inputs.image-tag }}" >> "$KUSTOMIZE_FILE"
            fi
            echo "update_method=kustomize" >> $GITHUB_OUTPUT
          else
            echo "::warning::No kustomization.yaml found in $MANIFEST_DIR"
            echo "update_method=none" >> $GITHUB_OUTPUT
          fi

      # ── Commit & Push ───────────────────────────────────────────────────
      - name: Configure Git
        run: |
          git config --global user.name "uFawkesDORA Bot"
          git config --global user.email "bot@ufawkes.dev"

      - name: Commit and push manifest update
        id: commit
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit — image tag ${{ inputs.image-tag }} already deployed"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore: promote ${{ inputs.image-name }}:${{ inputs.image-tag }} to ${{ inputs.environment }}"
          git push origin ${{ github.ref_name }}
          echo "committed=true" >> $GITHUB_OUTPUT
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "✅ Deployed ${{ inputs.image-name }}:${{ inputs.image-tag }} to ${{ inputs.environment }}"

      # ── Wait for Reconciliation ─────────────────────────────────────────
      - name: Wait for GitOps reconciliation
        if: steps.commit.outputs.committed == 'true' && inputs.wait-for-reconciliation > 0
        run: |
          echo "Waiting ${{ inputs.wait-for-reconciliation }}s for reconciliation..."
          sleep ${{ inputs.wait-for-reconciliation }}
          echo "✅ Reconciliation wait complete"

      # ── Rollback on Failure ─────────────────────────────────────────────
      - name: Rollback on failure
        if: |
          failure() &&
          inputs.rollback-on-failure &&
          inputs.previous-image-tag != ''
        run: |
          echo "⚠️ Rolling back to ${{ inputs.previous-image-tag }}..."
          MANIFEST_DIR="${{ inputs.manifest-path }}"
          find "$MANIFEST_DIR" -type f \( -name "*.yaml" -o -name "*.yml" \) -exec \
            sed -i "s|${{ inputs.image-tag }}|${{ inputs.previous-image-tag }}|g" {} +
          git add -A
          git commit -m "revert: rollback ${{ inputs.environment }} from ${{ inputs.image-tag }} to ${{ inputs.previous-image-tag }}"
          git push origin ${{ github.ref_name }}
          echo "✅ Rollback complete — reverted to ${{ inputs.previous-image-tag }}"

      # ── Outcome ─────────────────────────────────────────────────────────
      - name: Set deploy outcome
        id: deploy-outcome
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      # ── Summary ─────────────────────────────────────────────────────────
      - name: Generate deploy summary
        if: always()
        run: |
          echo "## Deployment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ inputs.image-name }}:${{ inputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.deploy-outcome.outputs.status }} |" >> $GITHUB_STEP_SUMMARY

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
