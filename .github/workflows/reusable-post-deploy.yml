# ============================================================================
# reusable-post-deploy.yml
# ----------------------------------------------------------------------------
# Stage 5: Post-Deployment Verification — runs smoke tests, telemetry checks,
# alert rule validation, and automated rollback triggers after a deployment.
#
# This workflow is designed to be called AFTER reusable-deploy.yml completes
# successfully, consuming its outputs (environment, deployed-tag).
#
# Usage:
#   jobs:
#     post-deploy:
#       uses: ./.github/workflows/reusable-post-deploy.yml
#       needs: [deploy]
#       with:
#         environment: ${{ needs.deploy.outputs.environment }}
#         deployed-tag: ${{ needs.deploy.outputs.deployed-tag }}
#         health-endpoints: |
#           https://api.dev.ufawkes.dev/health
#         smoke-test-command: |
#           curl -sf https://api.dev.ufawkes.dev/health
#         enable-rollback: true
# ============================================================================

name: Reusable Post-Deploy Verification

on:
  workflow_call:
    inputs:
      # -- Deployment Context ------------------------------------------------
      environment:
        description: "Environment to verify (dev, staging, production)"
        required: true
        type: string
      deployed-tag:
        description: "Deployed image tag to verify"
        required: true
        type: string

      # -- Health and Smoke Checks -------------------------------------------
      health-endpoints:
        description: "Newline-separated list of health endpoints to verify"
        required: false
        type: string
        default: ""
      smoke-test-command:
        description: "Shell command for smoke tests (runs after health checks)"
        required: false
        type: string
        default: ""
      smoke-retries:
        description: "Number of smoke test retries"
        required: false
        type: number
        default: 5
      smoke-delay:
        description: "Delay in seconds between smoke retries"
        required: false
        type: number
        default: 10

      # -- Telemetry Verification -------------------------------------------
      verify-prometheus:
        description: "Verify Prometheus targets are up after deploy"
        required: false
        type: boolean
        default: false
      prometheus-url:
        description: "Prometheus API URL for target verification"
        required: false
        type: string
        default: ""
      verify-alerts:
        description: "Verify no critical alerts are firing after deploy"
        required: false
        type: boolean
        default: false
      alertmanager-url:
        description: "Alertmanager API URL for alert check"
        required: false
        type: string
        default: ""

      # -- Rollback ----------------------------------------------------------
      enable-rollback:
        description: "Enable automated rollback on verification failure"
        required: false
        type: boolean
        default: false
      rollback-workflow:
        description: "Workflow to trigger for rollback (default: reusable-deploy.yml)"
        required: false
        type: string
        default: ".github/workflows/reusable-deploy.yml"
      previous-image-tag:
        description: "Previous stable image tag for rollback"
        required: false
        type: string
        default: ""
      image-name:
        description: "Container image name for rollback (required for rollback)"
        required: false
        type: string
        default: ""
      deploy-mode:
        description: "Deployment mode for rollback (monorepo or gitops-repo)"
        required: false
        type: string
        default: "monorepo"
      gitops-repo:
        description: "GitOps repo for rollback (gitops-repo mode only)"
        required: false
        type: string
        default: ""
      gitops-branch:
        description: "GitOps branch for rollback"
        required: false
        type: string
        default: "main"
      manifest-path:
        description: "Manifest path for rollback (monorepo mode)"
        required: false
        type: string
        default: "overlays/dev"

      # -- Observability ----------------------------------------------------
      enable-dora-metric:
        description: "Record a DORA deployment metric after verification"
        required: false
        type: boolean
        default: false
      dora-ingestion-url:
        description: "DORA ingestion API URL for recording deployment event"
        required: false
        type: string
        default: ""

    secrets:
      deploy-token:
        description: "Token for triggering rollback workflow"
        required: false
      prometheus-token:
        description: "Token for Prometheus API access"
        required: false
      alertmanager-token:
        description: "Token for Alertmanager API access"
        required: false
      dora-ingestion-token:
        description: "Token for DORA ingestion API"
        required: false

permissions:
  contents: read
  actions: read

jobs:
  post-deploy-verify:
    name: Post-Deploy Verification (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      verified: ${{ steps.verdict.outputs.verified }}
      rolled-back: ${{ steps.rollback-check.outputs.rolled-back }}

    steps:
      # -- DORA Timestamp ---------------------------------------------------
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "environment:${{ inputs.environment }}"
          echo "deployed-tag:${{ inputs.deployed-tag }}"

      # -- Phase 1: Health Endpoint Verification ----------------------------
      - name: Verify health endpoints
        id: health
        if: inputs.health-endpoints != ''
        run: |
          RETRIES=${{ inputs.smoke-retries }}
          DELAY=${{ inputs.smoke-delay }}

          # Read endpoints (newline-separated)
          echo "${{ inputs.health-endpoints }}" | while IFS= read -r endpoint; do
            [ -z "$endpoint" ] && continue
            endpoint=$(echo "$endpoint" | xargs)
            echo "Checking endpoint: $endpoint"

            for i in $(seq 1 $RETRIES); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$endpoint" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "204" ]; then
                echo "OK $endpoint -- HTTP $HTTP_CODE (attempt $i/$RETRIES)"
                break
              fi
              if [ "$i" -eq "$RETRIES" ]; then
                echo "::error::$endpoint failed after $RETRIES attempts (last HTTP $HTTP_CODE)"
                echo "healthy=false" >> $GITHUB_OUTPUT
                exit 1
              fi
              echo "  HTTP $HTTP_CODE, retry $i/$RETRIES in ${DELAY}s..."
              sleep $DELAY
            done
          done

          echo "All health endpoints passed"
          echo "healthy=true" >> $GITHUB_OUTPUT

      # -- Phase 2: Smoke Tests (Custom Command) ----------------------------
      - name: Run smoke tests
        id: smoke
        if: inputs.smoke-test-command != ''
        run: |
          echo "Running smoke tests for ${{ inputs.environment }}..."
          if ${{ inputs.smoke-test-command }}; then
            echo "Smoke tests passed"
            echo "smoke_passed=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Smoke tests FAILED"
            echo "smoke_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # -- Phase 3: Prometheus Target Verification --------------------------
      - name: Verify Prometheus targets
        id: prometheus
        if: inputs.verify-prometheus && inputs.prometheus-url != ''
        run: |
          PROM_URL="${{ inputs.prometheus-url }}"
          echo "Checking Prometheus targets at $PROM_URL..."

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.prometheus-token }}" \
            "$PROM_URL/api/v1/targets" 2>/dev/null)

          if [ -z "$RESPONSE" ]; then
            echo "::warning::Could not reach Prometheus API"
            exit 0
          fi

          # Use jq to count unhealthy targets (jq is pre-installed on GHA runners)
          UNHEALTHY_COUNT=$(echo "$RESPONSE" | jq '[.data.activeTargets // [] | .[] | select(.health != "up")] | length')
          echo "Unhealthy targets: $UNHEALTHY_COUNT"

          if [ "$UNHEALTHY_COUNT" -gt 0 ]; then
            echo "Unhealthy targets found:"
            echo "$RESPONSE" | jq -r '.data.activeTargets // [] | .[] | select(.health != "up") | "  \(.labels.job // "unknown"): \(.health)"'
            echo "targets_healthy=false" >> $GITHUB_OUTPUT
          else
            echo "All Prometheus targets up"
            echo "targets_healthy=true" >> $GITHUB_OUTPUT
          fi

      # -- Phase 4: Alert Check ---------------------------------------------
      - name: Check for firing alerts
        id: alerts
        if: inputs.verify-alerts && inputs.alertmanager-url != ''
        continue-on-error: true
        run: |
          AM_URL="${{ inputs.alertmanager-url }}"
          echo "Checking alerts at $AM_URL..."

          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.alertmanager-token }}" \
            "$AM_URL/api/v2/alerts?silenced=false&inhibited=false&active=true" 2>/dev/null)

          if [ -z "$RESPONSE" ]; then
            echo "::warning::Could not reach Alertmanager API"
            exit 0
          fi

          # Use jq to find critical alerts (jq is pre-installed on GHA runners)
          CRITICAL_COUNT=$(echo "$RESPONSE" | jq '[.[] | select(.labels.severity == "critical")] | length')
          echo "Critical alerts: $CRITICAL_COUNT"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Critical alerts firing:"
            echo "$RESPONSE" | jq -r '.[] | select(.labels.severity == "critical") | "  \(.labels.alertname // "unknown"): \(.status.state // "unknown")"'
            echo "alerts_clear=false" >> $GITHUB_OUTPUT
          else
            echo "No critical alerts firing"
            echo "alerts_clear=true" >> $GITHUB_OUTPUT
          fi

      # -- Phase 5: Record DORA Deployment Metric ---------------------------
      - name: Record DORA deployment event
        if: inputs.enable-dora-metric && inputs.dora-ingestion-url != ''
        run: |
          INGESTION_URL="${{ inputs.dora-ingestion-url }}"

          # Build JSON payload using jq to avoid YAML heredoc parsing issues
          PAYLOAD=$(jq -n \
            --arg et "deployment" \
            --arg ev "1.0" \
            --arg rt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg src "ufawkesdora-pipeline" \
            --arg eid "deploy-$(date +%s)-${{ github.run_id }}" \
            --arg actor "${{ github.actor }}" \
            --arg env "${{ inputs.environment }}" \
            --arg svc "${{ github.repository }}" \
            --arg ver "${{ inputs.deployed-tag }}" \
            --arg sha "${{ github.sha }}" \
            --arg res "success" \
            '{
              event_type: $et,
              event_version: $ev,
              recorded_at: $rt,
              source: $src,
              event_id: $eid,
              actor: $actor,
              environment: $env,
              service: $svc,
              version: $ver,
              sha: $sha,
              result: $res,
              metadata: {
                run_id: env.GITHUB_RUN_ID,
                run_attempt: env.GITHUB_RUN_ATTEMPT
              }
            }')

          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "$INGESTION_URL/event" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.dora-ingestion-token }}" \
            -d "$PAYLOAD" 2>/dev/null || echo "000")

          if [ "$HTTP_CODE" = "201" ]; then
            echo "DORA deployment event recorded (HTTP $HTTP_CODE)"
          else
            echo "::warning::DORA ingestion returned HTTP $HTTP_CODE (non-critical)"
          fi

      # -- Verdict ----------------------------------------------------------
      - name: Determine verification verdict
        id: verdict
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "verified=true" >> $GITHUB_OUTPUT
            echo "All post-deployment checks passed"
          else
            echo "verified=false" >> $GITHUB_OUTPUT
          fi

      # -- Rollback Trigger -------------------------------------------------
      - name: Trigger automated rollback
        id: rollback-check
        if: |
          failure() &&
          inputs.enable-rollback &&
          inputs.previous-image-tag != ''
        run: |
          echo "::warning::Verification failed - triggering rollback to ${{ inputs.previous-image-tag }}"

          if [ "${{ inputs.deploy-mode }}" == "gitops-repo" ]; then
            gh workflow run reusable-deploy.yml \
              --ref ${{ inputs.gitops-branch }} \
              -f environment=${{ inputs.environment }} \
              -f image-tag=${{ inputs.previous-image-tag }} \
              -f image-name=${{ inputs.image-name }} \
              -f deploy-mode=${{ inputs.deploy-mode }} \
              -f gitops-repo=${{ inputs.gitops-repo }}
          else
            gh workflow run reusable-deploy.yml \
              -f environment=${{ inputs.environment }} \
              -f image-tag=${{ inputs.previous-image-tag }} \
              -f image-name=${{ inputs.image-name }} \
              -f deploy-mode=monorepo \
              -f manifest-path=${{ inputs.manifest-path }}
          fi

          echo "rolled-back=true" >> $GITHUB_OUTPUT
          echo "Rollback triggered - reverting to ${{ inputs.previous-image-tag }}"

      - name: Rollback skipped (no previous tag)
        if: |
          failure() &&
          inputs.enable-rollback &&
          inputs.previous-image-tag == ''
        run: |
          echo "::warning::Rollback enabled but no previous-image-tag provided - skipping"
          echo "rolled-back=false" >> $GITHUB_OUTPUT

      # -- Summary ----------------------------------------------------------
      - name: Generate verification summary
        if: always()
        run: |
          echo "## Post-Deployment Verification: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.health-endpoints }}" != "" ]; then
            echo "| Health Endpoints | ${{ steps.health.outputs.healthy == 'true' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.smoke-test-command }}" != "" ]; then
            echo "| Smoke Tests | ${{ steps.smoke.outputs.smoke_passed == 'true' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.verify-prometheus }}" == "true" ]; then
            echo "| Prometheus Targets | ${{ steps.prometheus.outputs.targets_healthy == 'true' && 'Up' || 'Issues' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.verify-alerts }}" == "true" ]; then
            echo "| Critical Alerts | ${{ steps.alerts.outputs.alerts_clear == 'true' && 'None' || 'Firing' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Verification Verdict:** ${{ steps.verdict.outputs.verified == 'true' && 'Passed' || 'Failed' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.rollback-check.outputs.rolled-back }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Rollback triggered to ${{ inputs.previous-image-tag }}**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
