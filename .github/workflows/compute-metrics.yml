# ============================================================================
# Compute DORA Metrics — Daily Cron
# ============================================================================
#
# Runs the DORA metrics computation on a schedule and on-demand via
# workflow_dispatch. Reads events from the TimescaleDB raw_events table,
# computes all five DORA 2025 delivery metrics, and writes results to the
# dora_snapshots table.
#
# Required secrets:
#   DATABASE_URL     — Postgres connection string for the dora_app role
#                      (e.g. postgresql://dora_app:...@host:5432/dora_metrics)
#   PUSHGATEWAY_URL  — (optional) Prometheus pushgateway endpoint
#                      (e.g. http://pushgateway.monitoring:9091)
#
# Environment:
#   Works with any PostgreSQL 16 + TimescaleDB instance reachable from
#   GitHub Actions runners.
#
# DORA 2025 metrics computed:
#   - Deployment Frequency (deploys/week)
#   - Lead Time for Changes (P50/P95 hours)
#   - FDRT — Deployment-gap recovery time (hours)
#   - Change Failure Rate (%)
#   - Rework Rate (% of user-visible reworks)
# ============================================================================

name: Compute DORA Metrics

on:
  schedule:
    # Daily at 06:00 UTC — avoids peak hours and gives time for
    # overnight event ingestion to settle before computation.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      window:
        description: "Days to look back (default: 30)"
        required: false
        type: number
        default: 30
      team:
        description: "Team filter (e.g. paruff/uFawkesObs, 'all' for all)"
        required: false
        type: string
        default: all
      pushgateway:
        description: "Push results to Prometheus pushgateway (true/false)"
        required: false
        type: boolean
        default: false
      verbose:
        description: "Verbose logging"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  compute-metrics:
    name: Compute DORA Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r compute/requirements.txt

      - name: Compute DORA metrics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS="--window ${{ inputs.window || 30 }}"
          ARGS="$ARGS --team ${{ inputs.team || 'all' }}"

          if [ "${{ inputs.verbose || false }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi

          if [ "${{ inputs.pushgateway || false }}" = "true" ]; then
            if [ -n "${{ secrets.PUSHGATEWAY_URL }}" ]; then
              ARGS="$ARGS --pushgateway ${{ secrets.PUSHGATEWAY_URL }}"
            else
              echo "WARNING: pushgateway requested but PUSHGATEWAY_URL secret not set"
            fi
          fi

          python compute/metrics.py $ARGS

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
