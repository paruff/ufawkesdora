# ============================================================================
# CI — Continuous Integration Pipeline
# ----------------------------------------------------------------------------
# Entry-point for all pull requests and pushes to main.
#
# Replaces the former pipeline.yml (5-phase orchestrator) and the legacy
# ci.yml (pre-commit-only).  All logic now lives in reusable workflows;
# this file is purely an orchestrator.
#
# Phases that ran on every PR/push in the old pipeline:
#   1. pre-commit   → reusable-preflight + reusable-lint (docs lint inlined)
#   2. post-commit  → reusable-build
#   3. pre-deploy   → reusable-tests + reusable-security-scanning +
#                      reusable-dependency-review
#
# Deploy (Phase 4) and post-deploy (Phase 5) moved to release.yml.
#
# Test tier split (AUDIT-003):
#   PR gate (ci.yml):        unit, docs (fast, < 5 min)
#   Nightly (scheduled.yml): compose-smoke, integration, e2e (heavy tiers)
#
# ── Pipeline contract (inlined from .pipeline.yml) ──────────────────────
#
# pipeline:
#   version: 2
#   name: uFawkesDORA
#   type: config
#
# gates:
#   preflight:
#     required: true
#     checks: [pre-commit, commit-format, pr-size]
#   lint:
#     required: true
#     tools: [yamllint, markdownlint, prettier]
#   security:
#     required: true
#     tools: [gitleaks, detect-secrets]
#   build:
#     required: true
#     steps: [config-validate]
#   tests:
#     required: true
#     tiers:
#       unit:
#         required: true
#         command: pytest tests/unit/ -v --tb=short
#         coverage: {total: 60, diff: 80}
#   deploy:
#     required: false
#     steps: [config-deploy]
#
# supply-chain:
#   sbom:             {enabled: false}
#   image-signing:    {enabled: false}
#   attestation:     {enabled: false}
#   container-scan:  {enabled: false}
#
# stages:
#   - {name: preflight, parallel: false}
#   - {name: lint,      parallel: true}
#   - {name: security,  parallel: true}
#   - {name: build,     parallel: false}
#   - {name: tests,     parallel: true}
#   - {name: deploy,    parallel: false}
#
# environments:
#   dev:        {auto-deploy: true,  branch: main}
#   staging:    {auto-deploy: false, branch: "release/*"}
#   production: {auto-deploy: false, branch: "v*"}
# ============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}  # deny all at workflow level; grant per job below

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Phase 1: Pre-Commit ──────────────────────────────────────────────
  preflight:
    name: Pre-flight
    uses: paruff/ufawkespipe/.github/workflows/reusable-preflight.yml@v1.2.0
    permissions:
      contents: read
      pull-requests: read
    with:
      pr-size-limit: 400

  lint:
    name: Lint
    uses: paruff/ufawkespipe/.github/workflows/reusable-lint.yml@v1.2.0
    permissions:
      contents: read
      pull-requests: read

  security:
    name: Security Scan
    uses: paruff/ufawkespipe/.github/workflows/reusable-security-scanning.yml@v1.1.0
    permissions:
      contents: read
      security-events: write
    with:
      scan-type: secrets
      upload-sarif: false

  # ─── Phase 2: Post-Commit ────────────────────────────────────────────
  build:
    name: Build & Validate
    needs: [preflight, lint, security]
    uses: paruff/ufawkespipe/.github/workflows/reusable-build.yml@v1.1.0
    permissions:
      contents: read
    with:
      validate-prometheus: true
      validate-otel: true
      validate-tempo: true
      validate-grafana: true
      fail-on-latest: true
      enable-coverage-gate: true
      coverage-threshold: 60

  # ─── Phase 3: Pre-Deployment ─────────────────────────────────────────
  tests:
    name: Tests
    needs: [build]
    uses: paruff/ufawkespipe/.github/workflows/reusable-tests.yml@v1.1.0
    permissions:
      contents: read
    with:
      test-tiers: "unit,docs"
      run-unit: true

  full-security:
    name: Full Security Scan
    needs: [build]
    uses: paruff/ufawkespipe/.github/workflows/reusable-security-scanning.yml@v1.1.0
    permissions:
      contents: read
      security-events: write
    with:
      scan-type: all
      severity-threshold: MEDIUM
      fail-on-critical: true
      upload-sarif: true

  dependency-review:
    name: Dependency Review
    needs: [build]
    if: github.event_name == 'pull_request'
    uses: paruff/ufawkespipe/.github/workflows/reusable-dependency-review.yml@v1.1.1
    permissions:
      contents: read
      pull-requests: write
    with:
      fail-on-severity: moderate
      comment-summary-in-pr: "true"

  # ─── Gate: CI Complete ──────────────────────────────────────────────
  ci-complete:
    name: CI Complete
    needs: [preflight, lint, security, build, tests, full-security, dependency-review]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Check results
        run: |
          echo "=== CI Results ==="
          echo "Pre-flight:          ${{ needs.preflight.result }}"
          echo "Lint:                ${{ needs.lint.result }}"
          echo "Security (secrets): ${{ needs.security.result }}"
          echo "Build & Validate:    ${{ needs.build.result }}"
          echo "Tests:               ${{ needs.tests.result }}"
          echo "Security (full):     ${{ needs.full-security.result }}"
          echo "Dependency Review:   ${{ needs.dependency-review.result }}"

          if [ "${{ needs.preflight.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.tests.result }}" == "failure" ] || \
             [ "${{ needs.full-security.result }}" == "failure" ]; then
            echo ""
            echo "CI FAILED"
            exit 1
          fi

          # Dependency review: only required on pull_request; skipped on push is OK
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ needs.dependency-review.result }}" != "success" ]; then
              echo "FAIL: Dependency review required on PR but did not pass"
              exit 1
            fi
          fi

          echo ""
          echo "CI PASSED"

      - name: DORA pipeline finish
        if: always()
        run: |
          echo "pipeline-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "pipeline-result:${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}"

      - name: Generate pipeline summary
        if: always()
        run: |
          echo "# CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-flight | ${{ needs.preflight.result == 'success' && 'Pass' || needs.preflight.result == 'skipped' && 'Skipped' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security (secrets) | ${{ needs.security.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Validate | ${{ needs.build.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security (full) | ${{ needs.full-security.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result == 'success' && 'Pass' || needs.dependency-review.result == 'skipped' && 'N/A' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
