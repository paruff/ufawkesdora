# ============================================================================
# Phase 2: Post-Commit — Build, Config Validation, Supply Chain
# ----------------------------------------------------------------------------
# Compiles/builds the application and validates configurations (OTel,
# Prometheus, etc.). Unit tests and coverage gate run in Phase 1 (pre-commit)
# for faster feedback.
#
# Dependencies: pre-commit.yml
# Followed by: pre-deployment.yml
# ============================================================================

name: Post-Commit

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Build & Config Validation ───────────────────────────────────────────
  build-validate:
    name: Build & Validate
    uses: ./.github/workflows/reusable-build.yml
    with:
      validate-prometheus: true
      validate-otel: true
      validate-tempo: true
      validate-grafana: true
      fail-on-latest: true
      # Coverage gate runs in Phase 1 (pre-commit), not here
      enable-coverage-gate: false

  # ─── Summary ────────────────────────────────────────────────────────────
  post-commit-summary:
    name: Post-Commit Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [build-validate]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== Post-Commit Results ==="
          echo "Build & Validate:     ${{ needs.build-validate.result }}"

          if [ "${{ needs.build-validate.result }}" == "failure" ]; then
            echo ""
            echo "❌ Post-Commit FAILED"
            exit 1
          fi

          echo ""
          echo "✅ Post-Commit PASSED"

      - name: Generate summary
        if: always()
        run: |
          echo "## Post-Commit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Validate | ${{ needs.build-validate.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
