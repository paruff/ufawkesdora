# ============================================================================
# Phase 3: Pre-Deployment — Integration/E2E/Smoke Tests, Security, Dep Review
# ----------------------------------------------------------------------------
# Runs the full test suite with Docker-backed integration, smoke, and E2E
# tests. Also scans for vulnerabilities and reviews dependency changes before
# any deployment occurs.
#
# Dependencies: post-commit.yml
# Followed by: deploy.yml
# ============================================================================

name: Pre-Deployment

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ─── Integration, Smoke & E2E Tests ─────────────────────────────────────
  full-tests:
    name: Full Tests (Integration → Smoke → E2E)
    uses: ./.github/workflows/ci-tests.yml
    with:
      # Unit tests already ran in Phase 1 (pre-commit); skip here to avoid
      # re-running them. This job runs integration, smoke, and E2E tests.
      run-unit: false

  # ─── Full Security Scanning ──────────────────────────────────────────────
  security:
    name: Security Scanning
    uses: ./.github/workflows/reusable-security-scanning.yml
    with:
      scan-type: all
      severity-threshold: MEDIUM
      fail-on-critical: true
      upload-sarif: true

  # ─── Dependency Review ──────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    uses: ./.github/workflows/reusable-dependency-review.yml
    with:
      fail-on-severity: high
      comment-summary-in-pr: "true"

  # ─── Summary ────────────────────────────────────────────────────────────
  pre-deployment-summary:
    name: Pre-Deployment Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [full-tests, security, dependency-review]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== Pre-Deployment Results ==="
          echo "Full Tests:           ${{ needs.full-tests.result }}"
          echo "Security Scanning:    ${{ needs.security.result }}"
          echo "Dependency Review:    ${{ needs.dependency-review.result }}"

          if [ "${{ needs.full-tests.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.dependency-review.result }}" == "failure" ]; then
            echo ""
            echo "❌ Pre-Deployment FAILED"
            exit 1
          fi

          echo ""
          echo "✅ Pre-Deployment PASSED"

      - name: Generate summary
        if: always()
        run: |
          echo "## Pre-Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Full Tests | ${{ needs.full-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scanning | ${{ needs.security.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
