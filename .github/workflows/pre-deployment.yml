# ============================================================================
# Phase 3: Pre-Deployment — Integration/E2E Tests, Security Scanning, SBOM
# ----------------------------------------------------------------------------
# Runs full-stack integration tests, end-to-end tests, security vulnerability
# scanning, and dependency review before any deployment occurs.
#
# Dependencies: post-commit.yml
# Followed by: deploy.yml
# ============================================================================

name: Pre-Deployment

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ─── Integration & E2E Tests ────────────────────────────────────────────
  tests:
    name: Tests
    uses: ./.github/workflows/reusable-tests.yml
    with:
      test-tiers: "compose-smoke,integration,e2e,golden-path"
      python-version: "3.11"
      compose-profile: "core"
      health-endpoints: "http://localhost:8089/health"

  # ─── Security Scanning ──────────────────────────────────────────────────
  security:
    name: Security Scanning
    uses: ./.github/workflows/reusable-security-scanning.yml
    with:
      scan-type: all
      severity-threshold: MEDIUM
      fail-on-critical: true
      upload-sarif: true

  # ─── Dependency Review ──────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    uses: ./.github/workflows/reusable-dependency-review.yml
    with:
      fail-on-severity: high
      comment-summary-in-pr: "true"

  # ─── Summary ────────────────────────────────────────────────────────────
  pre-deployment-summary:
    name: Pre-Deployment Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [tests, security, dependency-review]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== Pre-Deployment Results ==="
          echo "Tests:                ${{ needs.tests.result }}"
          echo "Security Scanning:    ${{ needs.security.result }}"
          echo "Dependency Review:    ${{ needs.dependency-review.result }}"

          if [ "${{ needs.tests.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.dependency-review.result }}" == "failure" ]; then
            echo ""
            echo "❌ Pre-Deployment FAILED"
            exit 1
          fi

          echo ""
          echo "✅ Pre-Deployment PASSED"

      - name: Generate summary
        if: always()
        run: |
          echo "## Pre-Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scanning | ${{ needs.security.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
