# ============================================================================
# Scheduled Maintenance — Periodic Tasks
# ============================================================================
#
# Runs periodic maintenance tasks on a schedule and on-demand via
# workflow_dispatch. Each job declares its own minimal permissions.
#
# Jobs:
#   integration-tests      — Nightly integration, compose-smoke & E2E tests
#   pre-commit-autoupdate  — Updates pre-commit hook versions every Monday
#                            and opens a PR if changes are detected.
#   compute-dora-metrics   — Daily DORA metrics computation from TimescaleDB.
# ============================================================================

name: Scheduled Maintenance

on:
  schedule:
    # Nightly at 02:00 UTC — integration & E2E tests
    - cron: "0 2 * * *"
    # Every Monday at 09:00 UTC — pre-commit autoupdate
    - cron: "0 9 * * 1"
    # Daily at 06:00 UTC — DORA metrics computation
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      window:
        description: "Days to look back for metrics (default: 30)"
        required: false
        type: number
        default: 30
      team:
        description: "Team filter (e.g. paruff/uFawkesObs, 'all' for all)"
        required: false
        type: string
        default: all

permissions: {}  # deny all at workflow level; grant per job below

jobs:
  # ─── Pre-commit Autoupdate ──────────────────────────────────────────
  pre-commit-autoupdate:
    name: Weekly pre-commit autoupdate
    if: github.event_name != 'schedule' || github.event.schedule == '0 9 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v6.1.1
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run autoupdate
        run: pre-commit autoupdate
      - name: Create PR if changes exist
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.0.0
        with:
          commit-message: "chore(pre-commit): autoupdate hook versions"
          title: "chore(pre-commit): weekly hook version update"
          branch: chore/pre-commit-autoupdate
          labels: "type-chore,comp-pre-commit"

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─── Integration & E2E Tests (nightly) ──────────────────────────────
  integration-tests:
    name: Integration & E2E Tests
    if: github.event_name != 'schedule' || github.event.schedule == '0 2 * * *'
    uses: paruff/ufawkespipe/.github/workflows/reusable-tests.yml@v1.1.0
    permissions:
      contents: read
    with:
      test-tiers: "compose-smoke,integration,e2e"
      run-unit: false

  # ─── Compute DORA Metrics ───────────────────────────────────────────
  compute-dora-metrics:
    name: Compute DORA Metrics
    if: github.event_name != 'schedule' || github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v6.1.1
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r compute/requirements.txt

      - name: Compute DORA metrics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS="--window ${{ inputs.window || 30 }}"
          ARGS="$ARGS --team ${{ inputs.team || 'all' }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ARGS="$ARGS --verbose"
          fi

          if [ -n "${{ secrets.PUSHGATEWAY_URL }}" ]; then
            ARGS="$ARGS --pushgateway ${{ secrets.PUSHGATEWAY_URL }}"
          fi

          python compute/metrics.py $ARGS

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
