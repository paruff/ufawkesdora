name: Reusable Security Scanning

on:
  workflow_call:
    inputs:
      scan-type:
        description: "Type of scan: all, secrets, vulnerabilities, dependencies, container"
        required: false
        type: string
        default: "all"
      scan-path:
        description: "Path to scan"
        required: false
        type: string
        default: "."
      severity-threshold:
        description: "Minimum severity to report (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)"
        required: false
        type: string
        default: "MEDIUM"
      fail-on-critical:
        description: "Fail workflow on critical vulnerabilities"
        required: false
        type: boolean
        default: true
      upload-sarif:
        description: "Upload results to GitHub Security tab"
        required: false
        type: boolean
        default: true
      gitleaks-config:
        description: "Path to gitleaks config"
        required: false
        type: string
        default: ".gitleaks.toml"

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.1
        with:
          # Full history required for Gitleaks to resolve commit ranges
          fetch-depth: 0

      # ─── Secret Scanning (Gitleaks) ─────────────────────────────────────
      - name: Run secret scanning
        id: gitleaks
        if: inputs.scan-type == 'all' || inputs.scan-type == 'secrets'
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Check gitleaks results
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected potential secrets that are not in the allowlist."
          echo "::error::Review findings in the Security tab or update .gitleaks.toml to allowlist false positives."
          exit 1

      # ─── Vulnerability Scanning (Trivy FS) ─────────────────────────────
      - name: Run Trivy vulnerability scanner
        if: inputs.scan-type == 'all' || inputs.scan-type == 'vulnerabilities'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: ${{ inputs.scan-path }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: ${{ inputs.severity-threshold }}
          ignore-unfixed: true
          exit-code: ${{ inputs.fail-on-critical && '1' || '0' }}

      - name: Upload Trivy results to GitHub Security
        if: inputs.upload-sarif && (inputs.scan-type == 'all' || inputs.scan-type == 'vulnerabilities')
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7  # v4.2.5
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-filesystem"

      # ─── Dependency Scanning ────────────────────────────────────────────
      - name: Check Python dependencies
        if: (inputs.scan-type == 'all' || inputs.scan-type == 'dependencies')
        continue-on-error: true
        run: |
          if [ -f "requirements.txt" ]; then
            echo "📦 Found requirements.txt — scanning dependencies..."
            pip install safety
            safety check --file=requirements.txt || true
          fi

      - name: Check Node dependencies
        if: (inputs.scan-type == 'all' || inputs.scan-type == 'dependencies')
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            echo "📦 Found package.json — running npm audit..."
            npm audit --audit-level=moderate || true
          fi

      # ─── Container Scanning ─────────────────────────────────────────────
      - name: Scan Dockerfiles
        if: inputs.scan-type == 'container'
        run: |
          echo "🔍 Scanning Dockerfiles..."
          DOCKERFILES=$(find ${{ inputs.scan-path }} -type f -name "Dockerfile*" \
            -not -path "*/node_modules/*" \
            -not -path "*/vendor/*" | head -5)

          if [ -z "$DOCKERFILES" ]; then
            echo "⚠️  No Dockerfiles found"
            exit 0
          fi

          for dockerfile in $DOCKERFILES; do
            echo "📋 Scanning: $dockerfile"
            docker run --rm \
              -v "${{ github.workspace }}:/workspace" \
              aquasec/trivy config \
              --severity ${{ inputs.severity-threshold }} \
              "/workspace/$dockerfile"
          done

      # ─── Summary ────────────────────────────────────────────────────────
      - name: Generate scan summary
        if: always()
        run: |
          echo "### Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | ${{ inputs.scan-type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Severity Threshold | ${{ inputs.severity-threshold }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fail on Critical | ${{ inputs.fail-on-critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scans Performed:**" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.scan-type }}" == "all" ]; then
            echo "- ✅ Secret scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Vulnerability scanning (Trivy FS)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Dependency scanning" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ inputs.scan-type }}" == "secrets" ]; then
            echo "- ✅ Secret scanning (Gitleaks)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ inputs.scan-type }}" == "vulnerabilities" ]; then
            echo "- ✅ Vulnerability scanning (Trivy FS)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ inputs.scan-type }}" == "dependencies" ]; then
            echo "- ✅ Dependency scanning" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ inputs.scan-type }}" == "container" ]; then
            echo "- ✅ Container image scanning" >> $GITHUB_STEP_SUMMARY
          fi

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
