name: CI Tests

on:
  workflow_call:
    inputs:
      timeout-minutes:
        description: "Total test timeout in minutes"
        required: false
        type: number
        default: 30

permissions:
  contents: read

jobs:
  # ─── Unit Tests (fast, no Docker) ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio httpx pyyaml
          if [ -f requirements-ingestion.txt ]; then pip install -r requirements-ingestion.txt; fi
          if [ -f compute/requirements.txt ]; then pip install -r compute/requirements.txt; fi

      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ]; then
            pytest tests/unit/ -v --tb=short
          else
            echo "No unit tests found, skipping"
          fi
        continue-on-error: false

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─── Integration Tests (requires Docker) ──────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: DORA job start
        run: |
          echo "job-start:$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha:${{ github.sha }}"
          echo "workflow:${{ github.workflow }}"
          echo "job:${{ github.job }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio testcontainers psycopg2-binary httpx
          if [ -f requirements-ingestion.txt ]; then pip install -r requirements-ingestion.txt; fi
          if [ -f compute/requirements.txt ]; then pip install -r compute/requirements.txt; fi

      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            pytest tests/integration/ -v --tb=short
          else
            echo "No integration tests found, skipping"
          fi
        continue-on-error: false

      - name: DORA job finish
        if: always()
        run: echo "job-finish:$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─── Test Summary ──────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== Test Results ==="
          echo "Unit Tests:         ${{ needs.unit-tests.result }}"
          echo "Integration Tests:  ${{ needs.integration-tests.result }}"

          if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo ""
            echo "❌ Tests FAILED"
            exit 1
          fi

          echo ""
          echo "✅ All tests PASSED"

      - name: Generate summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tier | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit | ${{ needs.unit-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
