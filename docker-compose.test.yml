# ============================================================================
# docker-compose.test.yml
# ----------------------------------------------------------------------------
# Full test stack for Stage 3 E2E validation. Includes all services needed
# to run Playwright or request-based end-to-end tests against a live
# uFawkesDORA deployment.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml down -v
# ============================================================================

services:
  # ─── Test Database (ephemeral) ───────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ufawkesdora-test-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: e2e_test_pass # pragma: allowlist secret
      POSTGRES_DB: dora_metrics
      TIMESCALEDB_TELEMETRY: off
    volumes:
      - ./database/init/00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh:ro
      - ./database/init/01-dora-schema.sql:/docker-entrypoint-initdb.d/01-dora-schema.sql:ro
      - ./database/init/02-dora-roles.sql:/docker-entrypoint-initdb.d/02-dora-roles.sql:ro
      - ./database/timescaledb/hypertables.sql:/docker-entrypoint-initdb.d/03-hypertables.sql:ro
      - test-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dora_metrics"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ─── Ingestion API (FastAPI) ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: ufawkesdora-test-api
    ports:
      - "8089:8088"
    environment:
      DATABASE_URL: postgresql://dora_app:change_me_in_production@timescaledb:5432/dora_metrics # pragma: allowlist secret
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Async Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: ufawkesdora-test-worker
    command: python -m ingestion.processor.worker
    environment:
      DATABASE_URL: postgresql://dora_app:change_me_in_production@timescaledb:5432/dora_metrics # pragma: allowlist secret
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  test-pgdata:
    name: ufawkesdora_test_pgdata
